<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free temporary email, QR code, password generator, image compressor, text tools.">
    <title>TempTools - Free Online Utilities</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: white; font-weight: 600; }
        .email-list { max-height: 55vh; overflow-y: auto; }
        .drop-zone { border: 3px dashed #4b5563; transition: all 0.3s; }
        .drop-zone.dragover { border-color: #3b82f6; background-color: #1e2937; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <nav class="bg-gray-950 border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fas fa-tools text-3xl text-blue-500"></i>
                <h1 class="text-2xl font-bold">TempTools</h1>
            </div>
            <div class="flex items-center gap-8 text-sm font-medium">
                <a href="#" onclick="showSection('home')" class="nav-link text-white">🛠 Tools</a>
                <a href="#" onclick="showSection('about')" class="nav-link text-gray-300 hover:text-white">About</a>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-6">

        <div id="home" class="content-section active">
            <div class="flex border-b border-gray-700 mb-8 overflow-x-auto">
                <button onclick="switchTab(0)" class="tab-active px-6 py-4 text-lg whitespace-nowrap" id="tab0">📧 Temp Mail</button>
                <button onclick="switchTab(1)" class="px-6 py-4 text-lg text-gray-400 hover:text-gray-200 whitespace-nowrap" id="tab1">🔲 QR Code</button>
                <button onclick="switchTab(2)" class="px-6 py-4 text-lg text-gray-400 hover:text-gray-200 whitespace-nowrap" id="tab2">🔑 Password</button>
                <button onclick="switchTab(3)" class="px-6 py-4 text-lg text-gray-400 hover:text-gray-200 whitespace-nowrap" id="tab3">🖼️ Compressor</button>
                <button onclick="switchTab(4)" class="px-6 py-4 text-lg text-gray-400 hover:text-gray-200 whitespace-nowrap" id="tab4">📝 Text Tools</button>
            </div>

            <!-- Image Compressor (Fixed + Size Display) -->
            <div id="content3">
                <div class="bg-gray-800 rounded-3xl p-8 max-w-2xl mx-auto">
                    <h2 class="text-2xl font-bold mb-6 text-center">Image Compressor</h2>
                    
                    <div id="dropzone" class="drop-zone border-2 border-dashed border-gray-600 rounded-3xl p-12 text-center cursor-pointer hover:border-blue-500">
                        <i class="fas fa-cloud-upload-alt text-5xl mb-4 text-gray-500"></i>
                        <p class="text-lg">Drop image here or click to browse</p>
                        <input type="file" id="imageInput" accept="image/*" class="hidden">
                    </div>

                    <div id="compressorUI" class="hidden mt-8">
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <p class="text-center text-gray-400 mb-2">Original</p>
                                <img id="originalImg" class="max-h-64 mx-auto rounded-2xl">
                                <p id="originalSize" class="text-center text-sm text-gray-400 mt-2"></p>
                            </div>
                            <div>
                                <p class="text-center text-gray-400 mb-2">Compressed</p>
                                <img id="compressedImg" class="max-h-64 mx-auto rounded-2xl">
                                <p id="compressedSize" class="text-center text-sm text-green-400 mt-2"></p>
                            </div>
                        </div>
                        <button onclick="downloadCompressed()" class="mt-8 w-full bg-emerald-600 py-4 rounded-2xl font-medium">Download Compressed Image</button>
                    </div>
                </div>
            </div>

            <!-- Other tools remain the same -->
        </div>
    </div>

    <script>
        // Navigation (same as before)
        function showSection(section) {
            document.querySelectorAll('.content-section').forEach(el => el.classList.remove('active'));
            document.getElementById(section).classList.add('active');
        }

        function switchTab(n) {
            document.querySelectorAll('#home > div[id^="content"]').forEach(el => el.classList.add('hidden'));
            document.getElementById('content' + n).classList.remove('hidden');

            document.querySelectorAll('button[id^="tab"]').forEach(el => el.classList.remove('tab-active'));
            document.getElementById('tab' + n).classList.add('tab-active');
        }

        // ==================== IMAGE COMPRESSOR (Fixed) ====================
        let originalFile = null;
        let compressedDataUrl = null;

        const dropzone = document.getElementById('dropzone');
        const imageInput = document.getElementById('imageInput');

        dropzone.addEventListener('click', () => imageInput.click());

        imageInput.addEventListener('change', e => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        });

        // Drag & Drop
        dropzone.addEventListener('dragover', e => {
            e.preventDefault();
            dropzone.classList.add('dragover');
        });

        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('dragover');
        });

        dropzone.addEventListener('drop', e => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) return alert("Please upload an image file");

            originalFile = file;
            document.getElementById('compressorUI').classList.remove('hidden');

            const originalImg = document.getElementById('originalImg');
            originalImg.src = URL.createObjectURL(file);

            document.getElementById('originalSize').textContent = `Size: ${(file.size / 1024).toFixed(1)} KB`;

            compressImage();
        }

        function compressImage() {
            const quality = 0.8; // 80% quality
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();

            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);

                compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
                document.getElementById('compressedImg').src = compressedDataUrl;

                const compressedSize = Math.round((compressedDataUrl.length * 0.75) / 1024);
                document.getElementById('compressedSize').textContent = `Size: ${compressedSize} KB`;
            };
            img.src = URL.createObjectURL(originalFile);
        }

        function downloadCompressed() {
            if (!compressedDataUrl) return;
            const a = document.createElement('a');
            a.href = compressedDataUrl;
            a.download = 'compressed-' + originalFile.name;
            a.click();
        }

        // Initialize
        window.onload = () => {
            showSection('home');
            switchTab(3); // Start on Compressor tab for testing
        };
    </script>
</body>
</html>
