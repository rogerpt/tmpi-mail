<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free temporary email, QR code, password generator, image compressor, text tools.">
    <title>TempTools - Free Online Utilities</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: white; font-weight: 600; }
        .email-list { max-height: 55vh; overflow-y: auto; }
        .drop-zone { border: 3px dashed #4b5563; transition: all 0.3s; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <nav class="bg-gray-950 border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fas fa-tools text-3xl text-blue-500"></i>
                <h1 class="text-2xl font-bold">TempTools</h1>
            </div>
            <div class="flex items-center gap-8 text-sm font-medium">
                <a href="#" onclick="showSection('home')" class="nav-link text-white">🛠 Tools</a>
                <a href="#" onclick="showSection('about')" class="nav-link text-gray-300 hover:text-white">About</a>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-6">

        <div id="home" class="content-section active">
            <div class="flex border-b border-gray-700 mb-8 overflow-x-auto">
                <button onclick="switchTab(0)" class="tab-active px-6 py-4 text-lg whitespace-nowrap" id="tab0">📧 Temp Mail</button>
                <button onclick="switchTab(1)" class="px-6 py-4 text-lg text-gray-400 hover:text-gray-200 whitespace-nowrap" id="tab1">🔲 QR Code</button>
                <button onclick="switchTab(2)" class="px-6 py-4 text-lg text-gray-400 hover:text-gray-200 whitespace-nowrap" id="tab2">🔑 Password</button>
                <button onclick="switchTab(3)" class="px-6 py-4 text-lg text-gray-400 hover:text-gray-200 whitespace-nowrap" id="tab3">🖼️ Compressor</button>
                <button onclick="switchTab(4)" class="px-6 py-4 text-lg text-gray-400 hover:text-gray-200 whitespace-nowrap" id="tab4">📝 Text Tools</button>
            </div>

            <!-- Password Generator (Improved) -->
            <div id="content2">
                <div class="bg-gray-800 rounded-3xl p-8 max-w-md mx-auto">
                    <h2 class="text-2xl font-bold mb-6 text-center">Strong Password Generator</h2>
                    
                    <div id="password" class="bg-gray-900 p-5 rounded-2xl text-2xl font-mono text-center break-all mb-6 min-h-[70px] flex items-center justify-center"></div>

                    <div class="mb-6">
                        <label class="block text-sm text-gray-400 mb-2">Length: <span id="lengthValue" class="font-mono">16</span></label>
                        <input type="range" id="length" min="8" max="32" value="16" class="w-full accent-blue-500" oninput="updateLength()">
                    </div>

                    <div class="grid grid-cols-2 gap-4 text-sm mb-8">
                        <label class="flex items-center gap-2"><input type="checkbox" id="upper" checked> Uppercase (A-Z)</label>
                        <label class="flex items-center gap-2"><input type="checkbox" id="lower" checked> Lowercase (a-z)</label>
                        <label class="flex items-center gap-2"><input type="checkbox" id="numbers" checked> Numbers (0-9)</label>
                        <label class="flex items-center gap-2"><input type="checkbox" id="symbols" checked> Symbols (!@#$...)</label>
                    </div>

                    <button onclick="generatePassword()" class="w-full bg-purple-600 hover:bg-purple-700 py-4 rounded-2xl font-medium mb-3">Generate New Password</button>
                    <button onclick="copyPassword()" class="w-full bg-gray-700 hover:bg-gray-600 py-4 rounded-2xl font-medium">Copy Password</button>
                </div>
            </div>

        </div>

        <!-- About Section -->
        <div id="about" class="content-section">
            <h1 class="text-4xl font-bold mb-6">About TempTools</h1>
            <p class="text-gray-300">Free, fast, and privacy-friendly online utilities.</p>
        </div>
    </div>

    <script>
        function showSection(section) {
            document.querySelectorAll('.content-section').forEach(el => el.classList.remove('active'));
            document.getElementById(section).classList.add('active');
        }

        function switchTab(n) {
            document.querySelectorAll('#home > div[id^="content"]').forEach(el => el.classList.add('hidden'));
            document.getElementById('content' + n).classList.remove('hidden');

            document.querySelectorAll('button[id^="tab"]').forEach(el => el.classList.remove('tab-active'));
            document.getElementById('tab' + n).classList.add('tab-active');
        }

        // Password Generator
        function updateLength() {
            document.getElementById('lengthValue').textContent = document.getElementById('length').value;
        }

        function generatePassword() {
            const length = parseInt(document.getElementById('length').value);
            let chars = '';
            
            if (document.getElementById('upper').checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (document.getElementById('lower').checked) chars += 'abcdefghijklmnopqrstuvwxyz';
            if (document.getElementById('numbers').checked) chars += '0123456789';
            if (document.getElementById('symbols').checked) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

            if (chars === '') chars = 'abcdefghijklmnopqrstuvwxyz';

            let pass = '';
            for (let i = 0; i < length; i++) {
                pass += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('password').textContent = pass;
        }

        function copyPassword() {
            const pass = document.getElementById('password').textContent;
            if (pass) {
                navigator.clipboard.writeText(pass);
                alert("Password copied to clipboard!");
            }
        }

        // Initialize
        window.onload = () => {
            showSection('home');
            switchTab(2);           // Start on Password tab
            generatePassword();     // Generate first password
        };
    </script>
</body>
</html>
