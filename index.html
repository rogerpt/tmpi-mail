<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free temporary email, QR code, password generator, image compressor, text tools.">
    <title>TempTools - Free Online Utilities</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: white; font-weight: 600; }
        .email-list { max-height: 55vh; overflow-y: auto; }
        .drop-zone { border: 3px dashed #4b5563; transition: all 0.3s; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <nav class="bg-gray-950 border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fas fa-tools text-3xl text-blue-500"></i>
                <h1 class="text-2xl font-bold">TempTools</h1>
            </div>
            <div class="flex items-center gap-8 text-sm font-medium">
                <a href="#" onclick="showSection('home')" class="nav-link text-white">🛠 Tools</a>
                <a href="#" onclick="showSection('about')" class="nav-link text-gray-300 hover:text-white">About</a>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-6">

        <div id="home" class="content-section active">
            <div class="flex border-b border-gray-700 mb-8 overflow-x-auto">
                <button onclick="switchTab(0)" class="tab-active px-6 py-4 text-lg whitespace-nowrap" id="tab0">📧 Temp Mail</button>
                <button onclick="switchTab(1)" class="px-6 py-4 text-lg text-gray-400 hover:text-gray-200 whitespace-nowrap" id="tab1">🔲 QR Code</button>
                <button onclick="switchTab(2)" class="px-6 py-4 text-lg text-gray-400 hover:text-gray-200 whitespace-nowrap" id="tab2">🔑 Password</button>
                <button onclick="switchTab(3)" class="px-6 py-4 text-lg text-gray-400 hover:text-gray-200 whitespace-nowrap" id="tab3">🖼️ Compressor</button>
                <button onclick="switchTab(4)" class="px-6 py-4 text-lg text-gray-400 hover:text-gray-200 whitespace-nowrap" id="tab4">📝 Text Tools</button>
            </div>

            <!-- Temp Mail - Auto Username -->
            <div id="content0">
                <div class="bg-gray-800 rounded-2xl p-6 mb-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="text-gray-400 text-sm block mb-1">Domain</label>
                            <select id="domain" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3">
                                <option value="guerrillamail.com">guerrillamail.com</option>
                                <option value="sharklasers.com">sharklasers.com</option>
                                <option value="grr.la">grr.la</option>
                            </select>
                        </div>
                        <div class="flex items-end">
                            <button onclick="generateCustomEmail()" class="w-full bg-green-600 hover:bg-green-700 py-3 rounded-xl font-medium">Generate New Email</button>
                        </div>
                    </div>
                    <div class="mt-6 flex gap-3">
                        <code id="email" class="bg-gray-900 px-5 py-4 rounded-xl text-xl font-mono flex-1"></code>
                        <button onclick="copyEmail()" class="bg-gray-700 hover:bg-gray-600 p-4 rounded-xl"><i class="fas fa-copy"></i></button>
                    </div>
                    <div class="text-center mt-4">
                        <div id="timer" class="text-5xl font-mono font-bold text-orange-400">10:00</div>
                    </div>
                </div>
                <div class="bg-gray-800 rounded-2xl overflow-hidden">
                    <div class="px-6 py-4 border-b flex justify-between">
                        <h2 class="font-semibold">Inbox</h2>
                        <button onclick="refreshInbox()" class="text-blue-400">Refresh</button>
                    </div>
                    <div id="inbox" class="email-list divide-y divide-gray-700"></div>
                </div>
            </div>

            <!-- QR Code, Password, Compressor, Text Tools remain the same as previous version -->

        </div>

        <div id="about" class="content-section">
            <h1 class="text-4xl font-bold mb-6">About TempTools</h1>
            <p class="text-gray-300">Free privacy-first online utilities. No signup required.</p>
        </div>
    </div>

    <script>
        // Navigation
        function showSection(section) {
            document.querySelectorAll('.content-section').forEach(el => el.classList.remove('active'));
            document.getElementById(section).classList.add('active');
        }

        function switchTab(n) {
            document.querySelectorAll('#home > div[id^="content"]').forEach(el => el.classList.add('hidden'));
            document.getElementById('content' + n).classList.remove('hidden');

            document.querySelectorAll('button[id^="tab"]').forEach(el => el.classList.remove('tab-active'));
            document.getElementById('tab' + n).classList.add('tab-active');
        }

        // ==================== TEMP MAIL - AUTO USERNAME ====================
        let sidToken = '', currentEmail = '';
        let timerInterval, inboxInterval;

        async function generateCustomEmail() {
            const username = 'user' + Math.random().toString(36).substring(2, 10) + Math.floor(Math.random() * 999);
            try {
                const res = await fetch(`https://api.guerrillamail.com/ajax.php?f=set_email_user&email_user=${username}&lang=en`);
                const data = await res.json();
                sidToken = data.sid_token;
                currentEmail = data.email_addr;
                document.getElementById('email').textContent = currentEmail;
                startTimer();
                startAutoRefresh();
            } catch (e) {
                alert("Service busy. Try again in a few seconds.");
            }
        }

        function startTimer() {
            clearInterval(timerInterval);
            let time = 600;
            timerInterval = setInterval(() => {
                time--;
                const min = Math.floor(time / 60).toString().padStart(2, '0');
                const sec = (time % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = `${min}:${sec}`;
            }, 1000);
        }

        async function fetchInbox() {
            if (!sidToken) return;
            try {
                const res = await fetch(`https://api.guerrillamail.com/ajax.php?f=get_email_list&offset=0&lang=en&sid_token=${sidToken}`);
                const data = await res.json();
                updateInbox(data.list || []);
            } catch (e) {}
        }

        function updateInbox(messages) {
            const el = document.getElementById('inbox');
            if (messages.length === 0) {
                el.innerHTML = `<div class="p-12 text-center text-gray-500">No messages yet.<br>Send email to <span class="font-mono">${currentEmail}</span></div>`;
                return;
            }
            el.innerHTML = messages.map(m => `
                <div class="px-6 py-4 hover:bg-gray-700">
                    <div class="flex justify-between">
                        <p>${m.mail_from}</p>
                        <p class="text-xs text-gray-500">${new Date(m.mail_timestamp*1000).toLocaleTimeString()}</p>
                    </div>
                    <p class="text-gray-300">${m.mail_subject || '(no subject)'}</p>
                </div>
            `).join('');
        }

        function startAutoRefresh() {
            clearInterval(inboxInterval);
            inboxInterval = setInterval(fetchInbox, 5000);
        }

        function copyEmail() {
            if (currentEmail) navigator.clipboard.writeText(currentEmail);
        }

        function refreshInbox() { fetchInbox(); }

        // ==================== Other Tools (QR, Password, etc.) ====================
        // QR Code, Password, Compressor, Text Tools functions...

        window.onload = () => {
            showSection('home');
            switchTab(0);
            generateCustomEmail();   // Auto generate first email
        };
    </script>
</body>
</html>
