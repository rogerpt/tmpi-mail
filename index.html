<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free temporary email, QR code, password generator and more.">
    <title>TempTools - Free Online Utilities</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: white; font-weight: 600; }
        .email-list { max-height: 55vh; overflow-y: auto; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <nav class="bg-gray-950 border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fas fa-tools text-3xl text-blue-500"></i>
                <h1 class="text-2xl font-bold">TempTools</h1>
            </div>
            <div class="flex items-center gap-8 text-sm font-medium">
                <a href="#" onclick="showSection('home')" class="nav-link text-white">🛠 Tools</a>
                <a href="#" onclick="showSection('about')" class="nav-link text-gray-300 hover:text-white">About</a>
                <a href="#" onclick="showSection('faq')" class="nav-link text-gray-300 hover:text-white">FAQ</a>
                <a href="#" onclick="showSection('privacy')" class="nav-link text-gray-300 hover:text-white">Privacy</a>
                <a href="#" onclick="showSection('terms')" class="nav-link text-gray-300 hover:text-white">Terms</a>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-6">

        <!-- TOOLS -->
        <div id="home" class="content-section active">
            <div class="flex border-b border-gray-700 mb-8 overflow-x-auto">
                <button onclick="switchTab(0)" class="tab-active px-6 py-4 text-lg" id="tab0">📧 Temp Mail</button>
                <button onclick="switchTab(1)" class="px-6 py-4 text-lg text-gray-400 hover:text-gray-200" id="tab1">🔲 QR Code</button>
                <button onclick="switchTab(2)" class="px-6 py-4 text-lg text-gray-400 hover:text-gray-200" id="tab2">🔑 Password</button>
            </div>

            <!-- QR Code Tab -->
            <div id="content1">
                <div class="bg-gray-800 rounded-3xl p-8 max-w-md mx-auto">
                    <h2 class="text-2xl font-bold mb-6 text-center">QR Code Generator</h2>
                    <input id="qrtext" type="text" value="https://tempapp.guru" 
                           class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-5 py-4 mb-6">
                    <div class="flex gap-4 mb-6">
                        <button onclick="generateQR()" class="flex-1 bg-blue-600 py-3 rounded-2xl">Generate</button>
                        <button onclick="downloadQR()" class="flex-1 bg-emerald-600 py-3 rounded-2xl">Download PNG</button>
                    </div>
                    <div id="qrcontainer" class="bg-white p-6 rounded-2xl flex justify-center min-h-[280px]"></div>
                </div>
            </div>
        </div>

        <!-- About -->
        <div id="about" class="content-section">
            <h1 class="text-4xl font-bold">About TempTools</h1>
        </div>

    </div>

    <script>
        function showSection(section) {
            document.querySelectorAll('.content-section').forEach(el => el.classList.remove('active'));
            document.getElementById(section).classList.add('active');
        }

        function switchTab(n) {
            document.querySelectorAll('#home > div[id^="content"]').forEach(el => el.classList.add('hidden'));
            document.getElementById('content' + n).classList.remove('hidden');

            document.querySelectorAll('button[id^="tab"]').forEach(el => el.classList.remove('tab-active'));
            document.getElementById('tab' + n).classList.add('tab-active');
        }

        // QR Code Functions
        let currentQR = null;

        function generateQR() {
            const text = document.getElementById('qrtext').value.trim();
            if (!text) return alert("Please enter some text or URL");

            const container = document.getElementById('qrcontainer');
            container.innerHTML = '';

            currentQR = new QRCode(container, {
                text: text,
                width: 256,
                height: 256,
                colorDark: "#000000",
                colorLight: "#ffffff"
            });
        }

        function downloadQR() {
            if (!currentQR) return alert("Generate a QR code first");
            const link = document.createElement('a');
            link.download = 'qrcode.png';
            link.href = document.querySelector('#qrcontainer canvas').toDataURL('image/png');
            link.click();
        }

        // Initialize
        window.onload = () => {
            showSection('home');
            switchTab(1);           // Start on QR Code tab
            generateQR();           // Auto generate default QR
        };
    </script>
</body>
</html>
