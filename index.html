<script>
    let currentEmail = '';
    let currentToken = '';        // For Mail.tm authentication
    let timerInterval;
    let messages = [];
    let inboxInterval;

    // Generate random username
    function generateRandomLogin() {
        return Math.random().toString(36).substring(2, 10) + Math.floor(Math.random() * 99);
    }

    async function generateNewEmail() {
        try {
            const login = generateRandomLogin();
            const domain = "mail.tm";   // You can add more domains later

            // Create account on Mail.tm
            const regRes = await fetch('https://api.mail.tm/accounts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    address: `${login}@${domain}`,
                    password: 'temppass123'
                })
            });

            if (!regRes.ok) throw new Error("Failed to create account");

            // Login to get token
            const loginRes = await fetch('https://api.mail.tm/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    address: `${login}@${domain}`,
                    password: 'temppass123'
                })
            });

            const tokenData = await loginRes.json();
            currentToken = tokenData.token;
            currentEmail = `${login}@${domain}`;

            document.getElementById('email').textContent = currentEmail;
            messages = [];
            updateInbox();

            startTimer();
            startAutoRefresh();

        } catch (e) {
            console.error(e);
            alert("Service is temporarily busy. Try 'New Address' again in a few seconds.");
        }
    }

    function startTimer() {
        clearInterval(timerInterval);
        let time = 600; // 10 minutes
        timerInterval = setInterval(() => {
            time--;
            const min = Math.floor(time / 60).toString().padStart(2, '0');
            const sec = (time % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${min}:${sec}`;
            if (time <= 0) {
                clearInterval(timerInterval);
                generateNewEmail();
            }
        }, 1000);
    }

    async function fetchInbox() {
        if (!currentToken) return;
        try {
            const res = await fetch('https://api.mail.tm/messages', {
                headers: { 'Authorization': `Bearer ${currentToken}` }
            });
            const data = await res.json();
            messages = data['hydra:member'] || [];
            updateInbox();
        } catch (e) {
            console.error("Inbox fetch failed");
        }
    }

    function updateInbox() {
        const inboxEl = document.getElementById('inbox');
        if (messages.length === 0) {
            inboxEl.innerHTML = `<div class="p-12 text-center text-gray-500">No messages yet.<br>Send mail to <span class="font-mono">${currentEmail}</span></div>`;
            return;
        }

        inboxEl.innerHTML = messages.map(msg => `
            <div onclick="openMessage('${msg.id}')" class="px-6 py-4 hover:bg-gray-700 cursor-pointer flex gap-4">
                <div class="w-10 h-10 bg-blue-900 rounded-full flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-envelope text-blue-400"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex justify-between">
                        <p class="font-medium truncate">${msg.from.name || msg.from.address}</p>
                        <p class="text-xs text-gray-500">${new Date(msg.createdAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</p>
                    </div>
                    <p class="text-gray-300 truncate">${msg.subject || '(no subject)'}</p>
                </div>
            </div>
        `).join('');
    }

    async function openMessage(id) {
        try {
            const res = await fetch(`https://api.mail.tm/messages/${id}`, {
                headers: { 'Authorization': `Bearer ${currentToken}` }
            });
            const msg = await res.json();

            document.getElementById('viewer-subject').textContent = msg.subject || '(no subject)';
            document.getElementById('viewer-from').textContent = msg.from.address;
            document.getElementById('viewer-time').textContent = new Date(msg.createdAt).toLocaleString();
            
            const body = msg.html ? msg.html : (msg.text || 'No content');
            document.getElementById('viewer-body').innerHTML = body;

            document.getElementById('viewer').classList.remove('hidden');
        } catch (e) {
            alert("Could not load message");
        }
    }

    function startAutoRefresh() {
        if (inboxInterval) clearInterval(inboxInterval);
        inboxInterval = setInterval(fetchInbox, 4000); // every 4 seconds
    }

    // Existing helper functions
    function copyEmail() {
        navigator.clipboard.writeText(currentEmail);
        const el = document.getElementById('email');
        const orig = el.style.backgroundColor;
        el.style.backgroundColor = '#166534';
        setTimeout(() => el.style.backgroundColor = orig, 800);
    }

    function refreshInbox() {
        fetchInbox();
    }

    function newEmail() {
        generateNewEmail();
    }

    function closeViewer() {
        document.getElementById('viewer').classList.add('hidden');
    }

    // Initialize
    window.onload = () => {
        generateNewEmail();
    };
</script>
