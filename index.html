<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempTools - Free Online Utilities</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .email-list { max-height: 55vh; overflow-y: auto; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: white; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div class="max-w-5xl mx-auto p-6">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <i class="fas fa-tools text-4xl text-blue-500"></i>
                <div>
                    <h1 class="text-3xl font-bold">TempTools</h1>
                    <p class="text-sm text-gray-400">Free temporary email + useful utilities</p>
                </div>
            </div>
        </header>

        <!-- Tabs -->
        <div class="flex border-b border-gray-700 mb-6">
            <button onclick="switchTab(0)" class="tab-active px-6 py-3 text-lg font-medium" id="tab0">📧 Temp Mail</button>
            <button onclick="switchTab(1)" class="px-6 py-3 text-lg font-medium text-gray-400 hover:text-gray-200" id="tab1">🔲 QR Code</button>
            <button onclick="switchTab(2)" class="px-6 py-3 text-lg font-medium text-gray-400 hover:text-gray-200" id="tab2">🔑 Password</button>
        </div>

        <!-- ==================== TEMP MAIL TAB ==================== -->
        <div id="content0">
            <!-- Your previous Temp Mail code is here (same as last version) -->
            <div class="bg-gray-800 rounded-2xl p-6 mb-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="text-gray-400 text-sm block mb-1">Username</label>
                        <input id="username" type="text" placeholder="yourname" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3">
                    </div>
                    <div>
                        <label class="text-gray-400 text-sm block mb-1">Domain</label>
                        <select id="domain" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3">
                            <option value="guerrillamail.com">guerrillamail.com</option>
                            <option value="sharklasers.com">sharklasers.com</option>
                            <option value="grr.la">grr.la</option>
                        </select>
                    </div>
                    <div class="flex items-end">
                        <button onclick="generateCustomEmail()" class="w-full bg-green-600 hover:bg-green-700 py-3 rounded-xl font-medium">
                            Generate Email
                        </button>
                    </div>
                </div>

                <div class="mt-6 flex gap-3">
                    <code id="email" class="bg-gray-900 px-5 py-4 rounded-xl text-xl font-mono flex-1"></code>
                    <button onclick="copyEmail()" class="bg-gray-700 hover:bg-gray-600 p-4 rounded-xl"><i class="fas fa-copy"></i></button>
                </div>

                <div class="text-center mt-4">
                    <div id="timer" class="text-5xl font-mono font-bold text-orange-400">10:00</div>
                </div>
            </div>

            <div class="bg-gray-800 rounded-2xl overflow-hidden">
                <div class="px-6 py-4 border-b flex justify-between">
                    <h2 class="font-semibold">Inbox</h2>
                    <button onclick="refreshInbox()" class="text-blue-400">Refresh</button>
                </div>
                <div id="inbox" class="email-list divide-y divide-gray-700"></div>
            </div>
        </div>

        <!-- ==================== QR CODE TAB ==================== -->
        <div id="content1" class="hidden">
            <div class="bg-gray-800 rounded-3xl p-8 max-w-md mx-auto">
                <h2 class="text-2xl font-bold mb-6 text-center">QR Code Generator</h2>
                <input id="qrtext" type="text" placeholder="Enter text, URL, or WiFi info..." 
                       class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-5 py-4 mb-6">
                
                <div class="flex gap-4 mb-6">
                    <button onclick="generateQR()" class="flex-1 bg-blue-600 py-3 rounded-2xl">Generate QR</button>
                    <button onclick="downloadQR()" class="flex-1 bg-emerald-600 py-3 rounded-2xl">Download PNG</button>
                </div>
                
                <div id="qrcontainer" class="bg-white p-6 rounded-2xl flex justify-center min-h-[250px]"></div>
            </div>
        </div>

        <!-- ==================== PASSWORD GENERATOR TAB ==================== -->
        <div id="content2" class="hidden">
            <div class="bg-gray-800 rounded-3xl p-8 max-w-md mx-auto">
                <h2 class="text-2xl font-bold mb-6 text-center">Strong Password Generator</h2>
                
                <div class="mb-6">
                    <div id="password" class="bg-gray-900 p-5 rounded-2xl text-2xl font-mono text-center break-all"></div>
                </div>

                <div class="grid grid-cols-2 gap-4 text-sm mb-6">
                    <label><input type="checkbox" id="upper" checked> Uppercase</label>
                    <label><input type="checkbox" id="lower" checked> Lowercase</label>
                    <label><input type="checkbox" id="numbers" checked> Numbers</label>
                    <label><input type="checkbox" id="symbols" checked> Symbols</label>
                </div>

                <button onclick="generatePassword()" class="w-full bg-purple-600 hover:bg-purple-700 py-4 rounded-2xl font-medium mb-4">
                    Generate New Password
                </button>
                <button onclick="copyPassword()" class="w-full bg-gray-700 hover:bg-gray-600 py-4 rounded-2xl font-medium">
                    Copy Password
                </button>

                <div id="strength" class="mt-6 text-center text-sm"></div>
            </div>
        </div>
    </div>

    <!-- Email Viewer (same as before) -->
    <div id="viewer" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
        <div class="bg-gray-800 rounded-3xl max-w-2xl w-full max-h-[90vh] overflow-hidden">
            <div class="p-6 border-b flex justify-between">
                <h3 id="viewer-subject" class="font-semibold"></h3>
                <button onclick="closeViewer()" class="text-2xl">✕</button>
            </div>
            <div class="p-6">
                <div class="text-gray-400 mb-4">From: <span id="viewer-from" class="font-mono"></span></div>
                <div id="viewer-time" class="text-gray-400 mb-4"></div>
                <div id="viewer-body" class="message-body text-gray-200"></div>
            </div>
        </div>
    </div>

    <script>
        // ==================== TEMP MAIL LOGIC ====================
        let sidToken = '', currentEmail = '';
        let timerInterval, inboxInterval, messages = [];

        async function generateCustomEmail() {
            const username = document.getElementById('username').value.trim() || Math.random().toString(36).substring(2, 10);
            try {
                const res = await fetch(`https://api.guerrillamail.com/ajax.php?f=set_email_user&email_user=${username}&lang=en`);
                const data = await res.json();
                sidToken = data.sid_token;
                currentEmail = data.email_addr;
                document.getElementById('email').textContent = currentEmail;
                startTimer();
                startAutoRefresh();
            } catch (e) { alert("Service busy, try again."); }
        }

        function startTimer() {
            clearInterval(timerInterval);
            let time = 600;
            timerInterval = setInterval(() => {
                time--;
                const m = Math.floor(time/60).toString().padStart(2,'0');
                const s = (time%60).toString().padStart(2,'0');
                document.getElementById('timer').textContent = `${m}:${s}`;
                if (time <= 0) generateCustomEmail();
            }, 1000);
        }

        async function fetchInbox() {
            if (!sidToken) return;
            try {
                const res = await fetch(`https://api.guerrillamail.com/ajax.php?f=get_email_list&sid_token=${sidToken}`);
                const data = await res.json();
                messages = data.list || [];
                updateInbox();
            } catch(e){}
        }

        function updateInbox() {
            const el = document.getElementById('inbox');
            if (!messages.length) {
                el.innerHTML = `<div class="p-12 text-center text-gray-500">No messages yet.<br>Send to <span class="font-mono">${currentEmail}</span></div>`;
                return;
            }
            el.innerHTML = messages.map(m => `
                <div onclick="openMessage('${m.mail_id}')" class="px-6 py-4 hover:bg-gray-700 cursor-pointer flex gap-4">
                    <div class="w-10 h-10 bg-blue-900 rounded-full flex items-center justify-center"><i class="fas fa-envelope"></i></div>
                    <div class="flex-1">
                        <div class="flex justify-between"><p class="truncate">${m.mail_from}</p><p class="text-xs">${new Date(m.mail_timestamp*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</p></div>
                        <p class="text-gray-300 truncate">${m.mail_subject || '(no subject)'}</p>
                    </div>
                </div>
            `).join('');
        }

        async function openMessage(id) {
            try {
                const res = await fetch(`https://api.guerrillamail.com/ajax.php?f=fetch_email&email_id=${id}&sid_token=${sidToken}`);
                const msg = await res.json();
                document.getElementById('viewer-subject').textContent = msg.mail_subject;
                document.getElementById('viewer-from').textContent = msg.mail_from;
                document.getElementById('viewer-time').textContent = new Date(msg.mail_timestamp*1000).toLocaleString();
                document.getElementById('viewer-body').innerHTML = msg.mail_body || 'No content';
                document.getElementById('viewer').classList.remove('hidden');
            } catch(e){}
        }

        function startAutoRefresh() { clearInterval(inboxInterval); inboxInterval = setInterval(fetchInbox, 4000); }
        function copyEmail() { navigator.clipboard.writeText(currentEmail); }
        function refreshInbox() { fetchInbox(); }
        function closeViewer() { document.getElementById('viewer').classList.add('hidden'); }

        // ==================== TAB SYSTEM ====================
        function switchTab(n) {
            document.querySelectorAll('[id^="content"]').forEach(el => el.classList.add('hidden'));
            document.getElementById('content'+n).classList.remove('hidden');
            
            document.querySelectorAll('button[id^="tab"]').forEach(el => el.classList.remove('tab-active'));
            document.getElementById('tab'+n).classList.add('tab-active');
        }

        // ==================== QR CODE ====================
        let currentQR = null;
        function generateQR() {
            const text = document.getElementById('qrtext').value.trim() || "https://example.com";
            document.getElementById('qrcontainer').innerHTML = '';
            currentQR = new QRCode(document.getElementById('qrcontainer'), {
                text: text,
                width: 280,
                height: 280,
                colorDark : "#000000",
                colorLight : "#ffffff",
            });
        }
        function downloadQR() {
            if (!currentQR) return alert("Generate a QR first");
            const link = document.createElement('a');
            link.download = 'qrcode.png';
            link.href = document.querySelector('#qrcontainer canvas').toDataURL();
            link.click();
        }

        // ==================== PASSWORD GENERATOR ====================
        function generatePassword() {
            const length = 16;
            const upper = document.getElementById('upper').checked;
            const lower = document.getElementById('lower').checked;
            const numbers = document.getElementById('numbers').checked;
            const symbols = document.getElementById('symbols').checked;

            let chars = '';
            if (upper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (lower) chars += 'abcdefghijklmnopqrstuvwxyz';
            if (numbers) chars += '0123456789';
            if (symbols) chars += '!@#$%^&*()_+';

            let pass = '';
            for (let i = 0; i < length; i++) {
                pass += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('password').textContent = pass;
        }

        function copyPassword() {
            const pass = document.getElementById('password').textContent;
            if (pass) navigator.clipboard.writeText(pass);
        }

        // Initialize
        window.onload = () => {
            generateCustomEmail();
            generatePassword();        // initial password
            generateQR();              // initial QR
        };
    </script>
</body>
</html>
