<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempMail - Instant Disposable Email</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .email-list { max-height: 60vh; overflow-y: auto; }
        .message-body { white-space: pre-wrap; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div class="max-w-5xl mx-auto p-6">
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <i class="fas fa-envelope text-4xl text-blue-500"></i>
                <div>
                    <h1 class="text-3xl font-bold">TempMail</h1>
                    <p class="text-sm text-gray-400">Instant disposable email</p>
                </div>
            </div>
            <button onclick="newEmail()" 
                    class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-lg font-medium flex items-center gap-2">
                <i class="fas fa-plus"></i> New Address
            </button>
        </header>

        <!-- Controls -->
        <div class="bg-gray-800 rounded-2xl p-6 mb-8 shadow-xl">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <!-- Custom Username -->
                <div>
                    <label class="text-gray-400 text-sm block mb-1">Username</label>
                    <input id="username" type="text" placeholder="yourname" 
                           class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-lg focus:outline-none focus:border-blue-500">
                </div>
                
                <!-- Domain Selector -->
                <div>
                    <label class="text-gray-400 text-sm block mb-1">Domain</label>
                    <select id="domain" 
                            class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-lg focus:outline-none focus:border-blue-500">
                        <option value="guerrillamail.com">guerrillamail.com</option>
                        <option value="sharklasers.com">sharklasers.com</option>
                        <option value="grr.la">grr.la</option>
                        <option value="guerrillamail.net">guerrillamail.net</option>
                        <option value="guerrillamail.org">guerrillamail.org</option>
                    </select>
                </div>

                <div class="flex items-end">
                    <button onclick="generateCustomEmail()" 
                            class="w-full bg-green-600 hover:bg-green-700 py-3 rounded-xl font-medium flex items-center justify-center gap-2">
                        <i class="fas fa-check"></i> Generate Email
                    </button>
                </div>
            </div>

            <!-- Email Display -->
            <div class="mt-6 flex items-center gap-3">
                <code id="email" class="bg-gray-900 px-5 py-4 rounded-xl text-xl font-mono break-all flex-1"></code>
                <button onclick="copyEmail()" class="bg-gray-700 hover:bg-gray-600 p-4 rounded-xl">
                    <i class="fas fa-copy"></i>
                </button>
            </div>

            <div class="text-center mt-4">
                <div id="timer" class="text-5xl font-mono font-bold text-orange-400">10:00</div>
                <p class="text-xs text-gray-400">remaining</p>
            </div>
        </div>

        <!-- AdSense Top Banner Placeholder -->
        <!-- Paste your AdSense code here (728x90 or responsive) -->
        <div class="my-6 bg-gray-800 border border-dashed border-gray-600 rounded-2xl p-4 text-center text-gray-500 text-sm">
            [ AdSense Leaderboard Banner - 728×90 ]
        </div>

        <!-- Inbox -->
        <div class="bg-gray-800 rounded-2xl overflow-hidden shadow-xl">
            <div class="px-6 py-4 border-b border-gray-700 flex items-center justify-between">
                <h2 class="font-semibold flex items-center gap-2">
                    <i class="fas fa-inbox"></i> Inbox
                </h2>
                <button onclick="refreshInbox()" class="text-blue-400 hover:text-blue-300 flex items-center gap-2 text-sm">
                    <i class="fas fa-sync"></i> Refresh
                </button>
            </div>
            <div id="inbox" class="email-list divide-y divide-gray-700"></div>
        </div>

        <!-- Sidebar / In-content Ad Placeholder -->
        <!-- You can place 300x250 ads here later -->
    </div>

    <!-- Email Viewer -->
    <div id="viewer" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
        <div class="bg-gray-800 rounded-3xl max-w-2xl w-full max-h-[90vh] overflow-hidden">
            <div class="p-6 border-b border-gray-700 flex justify-between items-center">
                <h3 id="viewer-subject" class="font-semibold text-lg"></h3>
                <button onclick="closeViewer()" class="text-gray-400 hover:text-white text-2xl">✕</button>
            </div>
            <div class="p-6 text-sm">
                <div class="flex justify-between text-gray-400 mb-4">
                    <div>From: <span id="viewer-from" class="font-mono"></span></div>
                    <div id="viewer-time"></div>
                </div>
                <div id="viewer-body" class="message-body text-gray-200 leading-relaxed"></div>
            </div>
        </div>
    </div>

    <script>
        let sidToken = '';
        let currentEmail = '';
        let timerInterval;
        let inboxInterval;
        let messages = [];

        const domains = ["guerrillamail.com", "sharklasers.com", "grr.la", "guerrillamail.net", "guerrillamail.org"];

        async function generateCustomEmail() {
            const usernameInput = document.getElementById('username').value.trim();
            const selectedDomain = document.getElementById('domain').value;
            
            let username = usernameInput || Math.random().toString(36).substring(2, 10);
            
            try {
                const res = await fetch(`https://api.guerrillamail.com/ajax.php?f=set_email_user&email_user=${username}&lang=en`);
                const data = await res.json();
                
                sidToken = data.sid_token;
                currentEmail = data.email_addr || `${username}@${selectedDomain}`;

                document.getElementById('email').textContent = currentEmail;
                messages = [];
                updateInbox();

                startTimer();
                startAutoRefresh();
            } catch (e) {
                alert("Service busy. Try again or use random.");
            }
        }

        function startTimer() {
            clearInterval(timerInterval);
            let time = 600;
            timerInterval = setInterval(() => {
                time--;
                const min = Math.floor(time / 60).toString().padStart(2, '0');
                const sec = (time % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = `${min}:${sec}`;
                if (time <= 0) generateCustomEmail();
            }, 1000);
        }

        async function fetchInbox() {
            if (!sidToken) return;
            try {
                const res = await fetch(`https://api.guerrillamail.com/ajax.php?f=get_email_list&offset=0&lang=en&sid_token=${sidToken}`);
                const data = await res.json();
                messages = data.list || [];
                updateInbox();
            } catch (e) {}
        }

        function updateInbox() {
            const inboxEl = document.getElementById('inbox');
            if (messages.length === 0) {
                inboxEl.innerHTML = `<div class="p-12 text-center text-gray-500">No messages yet.<br>Send to <span class="font-mono">${currentEmail}</span></div>`;
                return;
            }
            inboxEl.innerHTML = messages.map(msg => `
                <div onclick="openMessage('${msg.mail_id}')" class="px-6 py-4 hover:bg-gray-700 cursor-pointer flex gap-4">
                    <div class="w-10 h-10 bg-blue-900 rounded-full flex items-center justify-center flex-shrink-0">
                        <i class="fas fa-envelope text-blue-400"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between">
                            <p class="font-medium truncate">${msg.mail_from}</p>
                            <p class="text-xs text-gray-500">${new Date(msg.mail_timestamp * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</p>
                        </div>
                        <p class="text-gray-300 truncate">${msg.mail_subject || '(no subject)'}</p>
                    </div>
                </div>
            `).join('');
        }

        async function openMessage(mailId) {
            try {
                const res = await fetch(`https://api.guerrillamail.com/ajax.php?f=fetch_email&email_id=${mailId}&lang=en&sid_token=${sidToken}`);
                const msg = await res.json();

                document.getElementById('viewer-subject').textContent = msg.mail_subject || '(no subject)';
                document.getElementById('viewer-from').textContent = msg.mail_from;
                document.getElementById('viewer-time').textContent = new Date(msg.mail_timestamp * 1000).toLocaleString();
                document.getElementById('viewer-body').innerHTML = msg.mail_body || 'No content';

                document.getElementById('viewer').classList.remove('hidden');
            } catch (e) {
                alert("Could not load message.");
            }
        }

        function startAutoRefresh() {
            if (inboxInterval) clearInterval(inboxInterval);
            inboxInterval = setInterval(fetchInbox, 4000);
        }

        function copyEmail() {
            navigator.clipboard.writeText(currentEmail);
            const el = document.getElementById('email');
            const orig = el.style.backgroundColor;
            el.style.backgroundColor = '#166534';
            setTimeout(() => el.style.backgroundColor = orig, 700);
        }

        function refreshInbox() { fetchInbox(); }
        function newEmail() { generateCustomEmail(); }
        function closeViewer() { document.getElementById('viewer').classList.add('hidden'); }

        // Initialize with random email
        window.onload = () => {
            generateCustomEmail();
        };
    </script>
</body>
</html>
