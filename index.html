<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free temporary email, QR code generator, password generator, image compressor and more useful online tools. No signup required.">
    <meta name="keywords" content="temp mail, temporary email, qr code generator, password generator, image compressor, free online tools">
    <meta name="author" content="TempTools">
    <title>TempTools - Free Online Utilities &amp; Temporary Email</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .email-list { max-height: 55vh; overflow-y: auto; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: white; font-weight: 600; }
        .drop-zone { border: 3px dashed #4b5563; transition: all 0.3s; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <div class="max-w-6xl mx-auto p-6">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <i class="fas fa-tools text-4xl text-blue-500"></i>
                <div>
                    <h1 class="text-3xl font-bold">TempTools</h1>
                    <p class="text-sm text-gray-400">Free utilities • No signup • Privacy friendly</p>
                </div>
            </div>
        </header>

        <!-- AdSense Top Banner -->
        <div class="my-6 bg-gray-800 border border-dashed border-gray-600 rounded-2xl p-4 text-center text-gray-500 text-sm min-h-[90px] flex items-center justify-center">
            <!-- === ADSENSE LEADERBOARD (728x90) === -->
            <!-- Paste your AdSense code here after approval -->
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-gray-700 mb-6 overflow-x-auto pb-1">
            <button onclick="switchTab(0)" class="tab-active px-6 py-3 text-lg" id="tab0">📧 Temp Mail</button>
            <button onclick="switchTab(1)" class="px-6 py-3 text-lg text-gray-400 hover:text-gray-200" id="tab1">🔲 QR Code</button>
            <button onclick="switchTab(2)" class="px-6 py-3 text-lg text-gray-400 hover:text-gray-200" id="tab2">🔑 Password</button>
            <button onclick="switchTab(3)" class="px-6 py-3 text-lg text-gray-400 hover:text-gray-200" id="tab3">🖼️ Compressor</button>
            <button onclick="switchTab(4)" class="px-6 py-3 text-lg text-gray-400 hover:text-gray-200" id="tab4">📝 Text Tools</button>
        </div>

        <!-- Content Tabs (same as before + new Text Tools) -->
        <!-- ... (I kept the previous 4 tabs code the same for brevity - they are unchanged) ... -->

        <!-- New Text Tools Tab -->
        <div id="content4" class="hidden">
            <div class="bg-gray-800 rounded-3xl p-8 max-w-2xl mx-auto">
                <h2 class="text-2xl font-bold mb-6 text-center">Text Tools</h2>
                <textarea id="textinput" rows="8" class="w-full bg-gray-900 border border-gray-700 rounded-2xl p-5" placeholder="Paste your text here..."></textarea>
                
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-6">
                    <button onclick="countText()" class="bg-gray-700 py-3 rounded-xl">Count Words</button>
                    <button onclick="toUpper()" class="bg-gray-700 py-3 rounded-xl">UPPERCASE</button>
                    <button onclick="toLower()" class="bg-gray-700 py-3 rounded-xl">lowercase</button>
                    <button onclick="copyText()" class="bg-emerald-600 py-3 rounded-xl">Copy Text</button>
                </div>
                
                <div id="textresult" class="mt-6 p-5 bg-gray-900 rounded-2xl text-sm"></div>
            </div>
        </div>
    </div>

    <!-- All your previous tool logic remains the same + new text tools functions -->

    <script>
        // ... (All previous functions: temp mail, qr, password, image compressor) ...

        // New Text Tools
        function countText() {
            const text = document.getElementById('textinput').value.trim();
            const words = text.split(/\s+/).filter(Boolean).length;
            const chars = text.length;
            document.getElementById('textresult').innerHTML = `
                <strong>Words:</strong> ${words} | 
                <strong>Characters:</strong> ${chars} | 
                <strong>Characters (no spaces):</strong> ${text.replace(/\s/g,'').length}
            `;
        }

        function toUpper() {
            document.getElementById('textinput').value = document.getElementById('textinput').value.toUpperCase();
        }
        function toLower() {
            document.getElementById('textinput').value = document.getElementById('textinput').value.toLowerCase();
        }
        function copyText() {
            navigator.clipboard.writeText(document.getElementById('textinput').value);
        }

        // Tab switching (updated for 5 tabs)
        function switchTab(n) {
            document.querySelectorAll('[id^="content"]').forEach(el => el.classList.add('hidden'));
            document.getElementById('content' + n).classList.remove('hidden');
            document.querySelectorAll('button[id^="tab"]').forEach(el => el.classList.remove('tab-active'));
            document.getElementById('tab' + n).classList.add('tab-active');
        }

        window.onload = () => {
            generateCustomEmail();
            generatePassword();
            generateQR();
        };
    </script>
</body>
</html>
