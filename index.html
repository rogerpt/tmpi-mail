<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free temporary email, QR code, password generator, image compressor and more.">
    <title>TempTools - Free Online Utilities</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: white; font-weight: 600; }
        .email-list { max-height: 55vh; overflow-y: auto; }
        .drop-zone { border: 3px dashed #4b5563; transition: all 0.3s; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <!-- Top Navigation -->
    <nav class="bg-gray-950 border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fas fa-tools text-3xl text-blue-500"></i>
                <h1 class="text-2xl font-bold">TempTools</h1>
            </div>
            <div class="flex items-center gap-8 text-sm font-medium">
                <a href="#" onclick="showSection('home')" class="nav-link text-white">🛠 Tools</a>
                <a href="#" onclick="showSection('about')" class="nav-link text-gray-300 hover:text-white">About</a>
                <a href="#" onclick="showSection('faq')" class="nav-link text-gray-300 hover:text-white">FAQ</a>
                <a href="#" onclick="showSection('privacy')" class="nav-link text-gray-300 hover:text-white">Privacy</a>
                <a href="#" onclick="showSection('terms')" class="nav-link text-gray-300 hover:text-white">Terms</a>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-6">

        <!-- TOOLS SECTION -->
        <div id="home" class="content-section active">
            <div class="flex border-b border-gray-700 mb-8 overflow-x-auto">
                <button onclick="switchTab(0)" class="tab-active px-6 py-4 text-lg" id="tab0">📧 Temp Mail</button>
                <button onclick="switchTab(1)" class="px-6 py-4 text-lg text-gray-400 hover:text-gray-200" id="tab1">🔲 QR Code</button>
                <button onclick="switchTab(2)" class="px-6 py-4 text-lg text-gray-400 hover:text-gray-200" id="tab2">🔑 Password</button>
                <button onclick="switchTab(3)" class="px-6 py-4 text-lg text-gray-400 hover:text-gray-200" id="tab3">🖼️ Compressor</button>
                <button onclick="switchTab(4)" class="px-6 py-4 text-lg text-gray-400 hover:text-gray-200" id="tab4">📝 Text Tools</button>
            </div>

            <!-- All tool contents here -->
            <div id="content0" class="tool-content"> <!-- Temp Mail --> ... (your temp mail code) </div>
            <div id="content1" class="tool-content hidden"> <!-- QR --> ... </div>
            <!-- etc. -->
        </div>

        <!-- ABOUT, FAQ, PRIVACY, TERMS sections -->
        <div id="about" class="content-section">
            <h1 class="text-4xl font-bold mb-6">About TempTools</h1>
            <p class="text-gray-300">Your full About text goes here...</p>
        </div>

        <div id="faq" class="content-section">
            <h1 class="text-4xl font-bold mb-6">FAQ</h1>
            <!-- FAQ content -->
        </div>

        <div id="privacy" class="content-section">
            <h1 class="text-4xl font-bold mb-6">Privacy Policy</h1>
            <!-- Privacy content -->
        </div>

        <div id="terms" class="content-section">
            <h1 class="text-4xl font-bold mb-6">Terms of Service</h1>
            <!-- Terms content -->
        </div>
    </div>

    <script>
        // Navigation between main sections (Tools, About, FAQ, etc.)
        function showSection(section) {
            document.querySelectorAll('.content-section').forEach(el => el.classList.remove('active'));
            document.getElementById(section).classList.add('active');
        }

        // Tool tabs inside Tools section
        function switchTab(n) {
            document.querySelectorAll('.tool-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('content' + n).classList.remove('hidden');
            
            document.querySelectorAll('button[id^="tab"]').forEach(el => el.classList.remove('tab-active'));
            document.getElementById('tab' + n).classList.add('tab-active');
        }

        window.onload = () => {
            showSection('home');
            switchTab(0);
        };
    </script>
</body>
</html>
